---
default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
  # ─── Security ───────────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ─── General ───────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # ─── Python (daemon) ───────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
        files: ^daemon/
      - id: ruff-format
        files: ^daemon/

  # ─── TypeScript / JavaScript ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|css|scss|md)$
        exclude: ^(electron/dist|ui/dist|node_modules)/

  # ─── Python type check ────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        files: ^daemon/

  # ─── Python quality ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/chrysa/pre-commit-tools
    rev: v0.1.1-92
    hooks:
      - id: adr-gate
      - id: console-debug-detection
      - id: console-log-detection
      - id: debugger-detection
      - id: dockerfile-no-latest
      - id: import-no-relative-parent
      - id: no-bare-except
      - id: no-console-warn
      - id: python-logger-detection
      - id: python-print-detection
      - id: react-console-error-detection
      - id: regression-gate
        stages: [pre-push]

  # ─── Commit message ────────────────────────────────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, chore, perf, revert, ci]
