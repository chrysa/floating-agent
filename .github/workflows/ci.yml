---
name: CI

on:
    pull_request:
        branches:
            - main
            - develop
    push:
        branches:
            - main
            - develop
            - "feat/**"
            - "fix/**"
            - "chore/**"
            - "ci/**"
    workflow_dispatch:

# Required for publish-unit-test-result-action and SonarCloud
permissions:
    checks: write
    contents: read
    pull-requests: write
    statuses: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    pre-commit:
        name: Pre-commit checks
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
                  cache: pip

            - uses: pre-commit/action@v3.0.1

    config:
        name: Build matrix config
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
            python-versions: ${{ steps.matrix.outputs.python-versions }}
            latest-python: ${{ steps.matrix.outputs.latest-python }}
        steps:
            - id: matrix
              shell: bash
              run: |
                  echo 'python-versions=["3.14"]' >> "$GITHUB_OUTPUT"
                  echo 'latest-python=3.14' >> "$GITHUB_OUTPUT"

    # ─── Python daemon ───────────────────────────────────────────────────────
    daemon-ruff:
        name: Daemon · Ruff (${{ matrix.python-version }})
        needs: config
        runs-on: ubuntu-latest
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup environment
              uses: chrysa/github-actions/tool-setup@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  extras: dev
                  working-directory: daemon

            - uses: chrysa/github-actions/ruff-check@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  latest-python: ${{ needs.config.outputs.latest-python }}
                  config: daemon/pyproject.toml
                  sources: daemon/floating_agent daemon/tests

    daemon-mypy:
        name: Daemon · Mypy (${{ matrix.python-version }})
        needs: config
        runs-on: ubuntu-latest
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup environment
              uses: chrysa/github-actions/tool-setup@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  extras: dev
                  working-directory: daemon

            - uses: chrysa/github-actions/mypy-check@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  latest-python: ${{ needs.config.outputs.latest-python }}
                  config-file: daemon/pyproject.toml
                  sources: daemon/floating_agent

    daemon-test:
        name: Daemon · Test (${{ matrix.python-version }})
        needs: config
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
            run:
                working-directory: daemon
        strategy:
            fail-fast: false
            matrix:
                python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup Python
              uses: chrysa/github-actions/python-setup@v1
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install project dependencies
              run: pip install -e '.[dev]'

            - name: Run tests
              run: |
                  mkdir -p reports
                  pytest \
                      --cov=floating_agent \
                      --cov-branch \
                      --cov-report=xml:reports/coverage.xml \
                      --cov-report=term-missing \
                      --junitxml=reports/junit.xml \
                      -v

    # ─── React UI ────────────────────────────────────────────────────────────
    ui:
        name: UI · Lint, test & build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              run: rm -f package-lock.json && npm install
              working-directory: ui

            - name: ESLint
              run: npm run lint
              working-directory: ui

            - name: Type-check
              run: npm run typecheck || npx tsc --noEmit
              working-directory: ui

            - name: Build
              run: npm run build
              working-directory: ui

            - name: Vitest
              run: npm run test -- --coverage --coverage.reporter=lcov
              working-directory: ui

    # ─── Electron ────────────────────────────────────────────────────────────
    electron:
        name: Electron · Lint & build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              run: npm install
              working-directory: electron

            - name: ESLint
              run: npm run lint
              working-directory: electron

            - name: Type-check
              run: npm run typecheck || npx tsc --noEmit
              working-directory: electron

            - name: Build
              run: npm run build
              working-directory: electron

    # ─── SonarCloud ──────────────────────────────────────────────────────────
    sonar:
        name: SonarCloud analysis
        needs: [config, daemon-ruff, daemon-mypy, daemon-test]
        if: always()
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: SonarCloud scan
              uses: chrysa/github-actions/sonar-scan@v1
              with:
                  latest-python: ${{ needs.config.outputs.latest-python }}
                  sonar-token: ${{ secrets.SONAR_TOKEN }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  project-key: chrysa_floating-agent
                  organization: chrysa
                  project-name: floating-agent
                  sources: daemon/floating_agent
                  tests: daemon/tests
