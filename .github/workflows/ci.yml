name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Python daemon ─────────────────────────────────────────────────────────
  daemon:
    name: Daemon (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check floating_agent

      - name: Format check (ruff)
        run: ruff format --check floating_agent

      - name: Type check (mypy)
        run: mypy floating_agent

      - name: Tests (pytest)
        run: pytest --cov=floating_agent --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: daemon/coverage.xml
          flags: daemon
        continue-on-error: true

  # ─── React UI ──────────────────────────────────────────────────────────────
  ui:
    name: UI (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

  # ─── Electron ──────────────────────────────────────────────────────────────
  electron:
    name: Electron (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
