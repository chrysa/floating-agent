---
name: CI

on:
    pull_request:
        branches:
            - main
            - develop
    push:
        branches:
            - main
            - develop
            - "feat/**"
            - "fix/**"
            - "chore/**"
            - "ci/**"
    workflow_dispatch:

permissions: {}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    config:
        name: Build matrix config
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        outputs:
            python-versions: ${{ steps.matrix.outputs.python-versions }}
            latest-python: ${{ steps.matrix.outputs.latest-python }}
        steps:
            - id: matrix
              shell: bash
              run: |
                  echo 'python-versions=["3.14"]' >> "$GITHUB_OUTPUT"
                  echo 'latest-python=3.14' >> "$GITHUB_OUTPUT"

    # ─── Python daemon ───────────────────────────────────────────────────────
    daemon-ruff:
        name: Daemon · Ruff (${{ matrix.python-version }})
        needs: config
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        defaults:
            run:
                working-directory: daemon
        strategy:
            fail-fast: false
            matrix:
                python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup Python
              uses: chrysa/github-actions/python-setup@main
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install project dependencies
              run: pip install -e '.[dev]'

            - name: Ruff — lint check
              run: |
                  mkdir -p reports
                  ruff check --config=pyproject.toml floating_agent tests --output-format=json > reports/ruff.json || true

            - name: Ruff — format check
              run: ruff format --check --config=pyproject.toml floating_agent tests

            - name: Upload ruff report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: ruff-report
                  path: daemon/reports/ruff.json
                  if-no-files-found: ignore

    daemon-mypy:
        name: Daemon · Mypy (${{ matrix.python-version }})
        needs: config
        runs-on: ubuntu-latest
        continue-on-error: true
        timeout-minutes: 20
        permissions:
            contents: read
        defaults:
            run:
                working-directory: daemon
        strategy:
            fail-fast: false
            matrix:
                python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup Python
              uses: chrysa/github-actions/python-setup@main
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install project dependencies
              run: pip install -e '.[dev]'

            - name: Mypy checks
              run: |
                  mkdir -p reports
                  mypy --config-file=pyproject.toml floating_agent 2>&1 | tee reports/mypy.txt; exit ${PIPESTATUS[0]}

            - name: Upload mypy report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: mypy-report
                  path: daemon/reports/mypy.txt
                  if-no-files-found: ignore

    daemon-test:
        name: Daemon · Test (${{ matrix.python-version }})
        needs: config
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
        defaults:
            run:
                working-directory: daemon
        strategy:
            fail-fast: false
            matrix:
                python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup Python
              uses: chrysa/github-actions/python-setup@main
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install project dependencies
              run: pip install -e '.[dev]'

            - name: Run tests
              run: |
                  mkdir -p reports
                  pytest \
                      --cov=floating_agent \
                      --cov-branch \
                      --cov-report=xml:reports/coverage.xml \
                      --cov-report=term-missing \
                      --junitxml=reports/junit.xml \
                      -v

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: test-results-${{ matrix.python-version }}
                  path: daemon/reports/
                  if-no-files-found: ignore

    # ─── React UI ────────────────────────────────────────────────────────────
    ui:
        name: UI · Lint, test & build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - name: Install dependencies
              run: rm -f package-lock.json && npm install
              working-directory: ui

            - name: ESLint
              run: npm run lint
              working-directory: ui

            - name: Type-check
              run: npm run typecheck || npx tsc --noEmit
              working-directory: ui

            - name: Build
              run: npm run build
              working-directory: ui

            - name: Vitest
              run: npm run test -- --coverage --coverage.reporter=lcov
              working-directory: ui

    # ─── Electron ────────────────────────────────────────────────────────────
    electron:
        name: Electron · Lint & build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - name: Install dependencies
              run: npm install
              working-directory: electron

            - name: ESLint
              run: npm run lint
              working-directory: electron

            - name: Type-check
              run: npm run typecheck || npx tsc --noEmit
              working-directory: electron

            - name: Build
              run: npm run build
              working-directory: electron

    # ─── SonarCloud ──────────────────────────────────────────────────────────
    sonar:
        name: SonarCloud analysis
        needs: [config, daemon-ruff, daemon-mypy, daemon-test]
        if: always()
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            checks: write
            pull-requests: write
            statuses: write
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: SonarCloud scan
              uses: chrysa/github-actions/sonar-scan-python@main
              with:
                  python-version: ${{ needs.config.outputs.latest-python }}
                  sonar-token: ${{ secrets.SONAR_TOKEN }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  project-key: chrysa_floating-agent
                  organization: chrysa
                  project-name: floating-agent
                  sources: daemon/floating_agent
                  tests: daemon/tests
