---
name: CI

on:
    pull_request:
        branches:
            - main
            - develop
    push:
        branches:
            - main
            - develop
            - "feat/**"
            - "fix/**"
            - "chore/**"
            - "ci/**"
    workflow_dispatch:

# Required for publish-unit-test-result-action and SonarCloud
permissions:
    checks: write
    contents: read
    pull-requests: write
    statuses: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    config:
        name: Build matrix config
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
            python-versions: ${{ steps.matrix.outputs.python-versions }}
            latest-python: ${{ steps.matrix.outputs.latest-python }}
        steps:
            - id: matrix
              shell: bash
              run: |
                  echo 'python-versions=["3.12","3.13","3.14"]' >> "$GITHUB_OUTPUT"
                  echo 'latest-python=3.14' >> "$GITHUB_OUTPUT"

    # ─── Python daemon ───────────────────────────────────────────────────────
    daemon-ruff:
        name: Daemon · Ruff (${{ matrix.python-version }})
        needs: config
        runs-on: ubuntu-latest
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup environment
              uses: chrysa/github-actions/tool-setup@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  extras: dev
              working-directory: daemon

            - name: Ruff checks
              uses: chrysa/github-actions/ruff-check@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  latest-python: ${{ needs.config.outputs.latest-python }}
                  sources: floating_agent tests

    daemon-mypy:
        name: Daemon · Mypy (${{ matrix.python-version }})
        needs: config
        runs-on: ubuntu-latest
        continue-on-error: true
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup environment
              uses: chrysa/github-actions/tool-setup@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  extras: dev
              working-directory: daemon

            - name: Mypy checks
              uses: chrysa/github-actions/mypy-check@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  latest-python: ${{ needs.config.outputs.latest-python }}
                  config-file: daemon/pyproject.toml
                  sources: floating_agent

    daemon-test:
        name: Daemon · Test (${{ matrix.python-version }})
        needs: config
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                python-version: ${{ fromJson(needs.config.outputs.python-versions) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup environment
              uses: chrysa/github-actions/tool-setup@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  extras: dev
              working-directory: daemon

            - name: Run tests
              uses: chrysa/github-actions/run-tests@v1
              with:
                  python-version: ${{ matrix.python-version }}
                  latest-python: ${{ needs.config.outputs.latest-python }}
                  cov-module: floating_agent

    # ─── React UI ────────────────────────────────────────────────────────────
    ui:
        name: UI · Lint, test & build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
                  cache-dependency-path: ui/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: ui

            - name: ESLint
              run: npm run lint
              working-directory: ui

            - name: Type-check
              run: npm run typecheck || npx tsc --noEmit
              working-directory: ui

            - name: Build
              run: npm run build
              working-directory: ui

            - name: Vitest
              run: npm run test -- --coverage --reporter=lcov
              working-directory: ui

    # ─── Electron ────────────────────────────────────────────────────────────
    electron:
        name: Electron · Lint & build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
                  cache-dependency-path: electron/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: electron

            - name: ESLint
              run: npm run lint
              working-directory: electron

            - name: Type-check
              run: npm run typecheck || npx tsc --noEmit
              working-directory: electron

            - name: Build
              run: npm run build
              working-directory: electron

    # ─── SonarCloud ──────────────────────────────────────────────────────────
    sonar:
        name: SonarCloud analysis
        needs: [config, daemon-ruff, daemon-mypy, daemon-test]
        if: always()
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: SonarCloud scan
              uses: chrysa/github-actions/sonar-scan@v1
              with:
                  latest-python: ${{ needs.config.outputs.latest-python }}
                  sonar-token: ${{ secrets.SONAR_TOKEN }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  project-key: chrysa_floating-agent
                  organization: chrysa
                  project-name: floating-agent
                  sources: daemon/floating_agent
                  tests: daemon/tests
